<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>模考Offer - 登录 / 注册</title>
  <style>
    :root {
      --bg: #F4F6FB;
      --glass: rgba(255, 255, 255, 0.65);
      --text: #0F172A;
      --muted: #64748B;
      --line: #E2E8F0;
      --line-strong: #CBD5E1;
      --brand: #4F46E5;
      --brand-gradient: linear-gradient(135deg, #5B6CFF 0%, #22D3EE 100%);
      --shadow: 0 8px 32px rgba(15, 23, 42, 0.10);
      --font: 'Inter', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 48px 24px;
      overflow: hidden;
      color: var(--text);
      font-family: var(--font);
      background:
        radial-gradient(circle at 19% 72%, rgba(91, 108, 255, 0.16), transparent 30%),
        radial-gradient(circle at 79% 68%, rgba(34, 211, 238, 0.22), transparent 32%),
        var(--bg);
      letter-spacing: 0;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.22)),
        radial-gradient(circle at 50% 96%, rgba(34, 211, 238, 0.12), transparent 18%);
    }

    .auth-shell {
      position: relative;
      width: min(420px, 100%);
      padding: 40px 32px 32px;
      border: 1px solid rgba(255, 255, 255, 0.88);
      border-radius: 24px;
      background: var(--glass);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .auth-shell::after {
      content: "";
      position: absolute;
      inset: 1px;
      z-index: -1;
      border-radius: 23px;
      border: 1px solid rgba(226, 232, 240, 0.72);
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 22px;
    }

    .brand img {
      height: 32px;
      width: auto;
      display: block;
    }

    .brand-name {
      font-size: 20px;
      line-height: 1.3;
      font-weight: 700;
      color: var(--text);
    }

    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.25;
      font-weight: 700;
      text-align: center;
    }

    .subtitle {
      margin: 12px 0 32px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      text-align: center;
    }

    .field {
      display: flex;
      align-items: center;
      gap: 12px;
      height: 56px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.46);
      transition: border-color .15s ease, box-shadow .15s ease;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.88);
    }

    .field svg {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
      color: #94A3B8;
    }

    .field input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font: 400 16px/1.5 var(--font);
    }

    .field input::placeholder {
      color: #94A3B8;
    }

    .primary-btn,
    .secondary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 56px;
      border-radius: 12px;
      font: 600 16px/1 var(--font);
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease, border-color .15s ease;
    }

    .primary-btn {
      margin-top: 24px;
      border: 0;
      color: #FFFFFF;
      background: var(--brand-gradient);
      box-shadow: 0 12px 24px rgba(79, 70, 229, 0.18);
    }

    .divider {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
      color: #94A3B8;
      font-size: 14px;
      line-height: 1;
    }

    .divider::before,
    .divider::after {
      content: "";
      height: 1px;
      background: var(--line);
    }

    .secondary-btn {
      gap: 12px;
      border: 1px solid var(--line);
      color: var(--text);
      background: rgba(255, 255, 255, 0.55);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.82);
    }

    .secondary-btn svg {
      width: 22px;
      height: 22px;
      color: #0F172A;
    }

    .terms {
      margin: 20px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      text-align: center;
    }

    .more-hint {
      margin: 18px 0 0;
      text-align: center;
      color: #94A3B8;
      font-size: 12px;
      line-height: 1.5;
    }

    .terms a {
      color: var(--brand);
      text-decoration: none;
      font-weight: 600;
    }

    .field:focus-within {
      border-color: var(--brand);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.88), 0 0 0 3px rgba(91, 108, 255, 0.14);
    }

    .primary-btn:hover { transform: translateY(-1px); box-shadow: 0 14px 28px rgba(79, 70, 229, 0.26); }
    .primary-btn:active { transform: translateY(0); box-shadow: 0 8px 18px rgba(79, 70, 229, 0.20); }
    .secondary-btn:hover { background: rgba(255, 255, 255, 0.9); border-color: var(--line-strong); }
    .terms a:hover { text-decoration: underline; }

    @media (max-width: 520px) {
      body {
        padding: 24px 16px;
        overflow: auto;
      }

      .auth-shell {
        padding: 40px 24px 28px;
      }

      .brand {
        margin-bottom: 24px;
      }

      h1 {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <main class="auth-shell" aria-label="邮箱登录与注册">
    <div class="brand">
      <img src="../../../资源/logo/png/horizontal-light-M.png" alt="模考Offer">
    </div>

    <h1>登录 / 注册</h1>
    <p class="subtitle">首次登录将自动为你注册</p>

    <label class="field" aria-label="邮箱">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M4 6.75A2.75 2.75 0 0 1 6.75 4h10.5A2.75 2.75 0 0 1 20 6.75v10.5A2.75 2.75 0 0 1 17.25 20H6.75A2.75 2.75 0 0 1 4 17.25V6.75Z" stroke="currentColor" stroke-width="1.8"/>
        <path d="m5.5 7 5.15 4.18a2.15 2.15 0 0 0 2.7 0L18.5 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <input type="email" placeholder="邮箱" value="">
    </label>

    <button class="primary-btn" type="button">发送验证码</button>

    <div class="divider">或</div>

    <button class="secondary-btn" type="button">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 .5A11.5 11.5 0 0 0 8.36 22.9c.58.11.79-.25.79-.56v-2.1c-3.23.7-3.91-1.38-3.91-1.38-.53-1.34-1.29-1.7-1.29-1.7-1.06-.72.08-.71.08-.71 1.17.08 1.78 1.2 1.78 1.2 1.04 1.78 2.73 1.27 3.4.97.1-.75.41-1.27.74-1.56-2.58-.29-5.29-1.29-5.29-5.74 0-1.27.45-2.3 1.2-3.12-.12-.29-.52-1.48.11-3.08 0 0 .98-.31 3.2 1.19a11.1 11.1 0 0 1 5.82 0c2.22-1.5 3.2-1.19 3.2-1.19.63 1.6.23 2.79.11 3.08.75.82 1.2 1.85 1.2 3.12 0 4.46-2.72 5.45-5.31 5.74.42.36.79 1.07.79 2.16v3.12c0 .31.21.68.8.56A11.5 11.5 0 0 0 12 .5Z"/>
      </svg>
      使用 GitHub 登录
    </button>

    <p class="more-hint">更多登录方式即将支持</p>

    <p class="terms">登录即代表同意<a href="#">服务条款</a>和<a href="#">隐私政策</a></p>
  </main>
</body>
</html>

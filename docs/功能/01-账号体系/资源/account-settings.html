<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>模考Offer - 账号设置</title>
  <style>
    :root {
      --bg: #F4F6FB;
      --glass: rgba(255, 255, 255, 0.65);
      --glass-strong: rgba(255, 255, 255, 0.85);
      --text: #0F172A;
      --muted: #64748B;
      --faint: #94A3B8;
      --line: #E2E8F0;
      --brand: #4F46E5;
      --brand-soft: rgba(79, 70, 229, 0.10);
      --grad: linear-gradient(135deg, #5B6CFF 0%, #22D3EE 100%);
      --shadow: 0 8px 32px rgba(15, 23, 42, 0.10);
      --font: 'Inter', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: var(--font);
      background:
        radial-gradient(circle at 14% 80%, rgba(91, 108, 255, 0.16), transparent 36%),
        radial-gradient(circle at 90% 74%, rgba(34, 211, 238, 0.18), transparent 36%),
        var(--bg);
    }

    svg { display: block; }

    /* ---------- 顶部导航：宽度自适应、居中悬浮、固定高度、大圆角；每段竖线 ---------- */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      justify-content: center;
      padding: 20px 24px 8px;
    }

    .nav-bar {
      position: relative;
      display: inline-flex;
      align-items: center;
      height: 60px;
      padding: 0 10px 0 18px;
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 30px;
      background: var(--glass);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .nav-logo { display: inline-flex; align-items: center; }
    .nav-logo img { height: 24px; width: auto; display: block; }

    .nav-sep { width: 1px; height: 26px; margin: 0 14px; background: var(--line); }

    .nav-item {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      height: 40px;
      padding: 0 16px;
      border-radius: 12px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
    }

    .nav-item svg { width: 18px; height: 18px; }

    .nav-item.active {
      color: var(--brand);
      background: #fff;
      box-shadow: 0 2px 6px rgba(15, 23, 42, 0.08);
    }

    .nav-avatar {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 6px 4px 4px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      cursor: default;
    }

    /* 占位人像（实际产品用用户上传头像）；离线打开时回退为浅灰底 */
    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      overflow: hidden;
      background: #E2E8F0 url('https://i.pravatar.cc/160?img=47') center/cover no-repeat;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.6);
    }

    .nav-avatar .chev { width: 16px; height: 16px; color: var(--muted); }

    /* ---------- 头像下拉 ---------- */
    .dropdown {
      position: absolute;
      top: 70px;
      right: 0;
      width: 232px;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 16px;
      background: var(--glass-strong);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .dropdown-head { display: flex; align-items: center; gap: 12px; padding: 10px 10px 14px; }
    .dropdown-head .avatar { width: 40px; height: 40px; }
    .dropdown-head .name { font-size: 15px; font-weight: 700; line-height: 1.3; }
    .dropdown-head .mail { margin-top: 2px; font-size: 12px; color: var(--muted); line-height: 1.3; }

    .dropdown-divider { height: 1px; margin: 0 4px 8px; background: var(--line); }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      height: 42px;
      padding: 0 12px;
      border-radius: 12px;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
    }

    .dropdown-item svg { width: 18px; height: 18px; color: var(--muted); }
    .dropdown-item.active { color: var(--brand); background: var(--brand-soft); }
    .dropdown-item.active svg { color: var(--brand); }

    /* ---------- 主体：左栏 + 内容 合并为一张卡，中间竖线分隔 ---------- */
    .layout { max-width: 1040px; margin: 0 auto; padding: 22px 24px 56px; }

    .panel {
      display: grid;
      grid-template-columns: 244px 1fr;
      border: 1px solid rgba(255, 255, 255, 0.88);
      border-radius: 24px;
      background: var(--glass);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      overflow: hidden;
    }

    .panel-nav { padding: 18px 14px; border-right: 1px solid var(--line); }

    .side-group {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 40px;
      padding: 0 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .side-group > svg:first-child { width: 18px; height: 18px; flex: 0 0 auto; }
    .side-group .grp-chev { margin-left: auto; width: 16px; height: 16px; color: var(--faint); }

    .side-item {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 52px;
      padding: 0 12px;
      margin-top: 2px;
      border-radius: 12px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }

    .side-item svg { width: 18px; height: 18px; flex: 0 0 auto; }
    .side-item.sub { padding-left: 30px; }              /* 仅「登录方式」作为账号与安全的子项缩进 */
    .side-item.active { color: var(--brand); background: var(--brand-soft); font-weight: 700; }
    .side-item.disabled { color: var(--faint); }

    .side-text { display: flex; flex-direction: column; line-height: 1.3; }
    .side-text .soon { margin-top: 2px; font-size: 11px; color: var(--faint); font-weight: 600; }

    /* ---------- 右侧内容 ---------- */
    .panel-content { min-width: 0; padding: 30px 34px 16px; }

    .card-title { margin: 0; font-size: 20px; line-height: 1.3; font-weight: 700; }
    .card-desc { margin: 10px 0 14px; color: var(--muted); font-size: 14px; line-height: 1.5; }

    .method-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 20px;
      min-height: 96px;
      border-top: 1px solid var(--line);
    }

    .method-info { display: flex; align-items: center; gap: 16px; min-width: 0; }

    .method-icon {
      flex: 0 0 auto;
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.6);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
      color: var(--text);
    }

    .method-icon svg { width: 22px; height: 22px; }
    .method-icon.wechat { color: var(--faint); }
    .method-icon.wechat svg { width: 28px; height: 28px; }

    .method-text { min-width: 0; }
    .method-name {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.4;
    }
    .method-sub { margin-top: 3px; font-size: 13px; color: var(--muted); line-height: 1.4; overflow-wrap: anywhere; }

    .badge {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 9px;
      border-radius: 999px;
      background: var(--brand-soft);
      color: var(--brand);
      font-size: 12px;
      font-weight: 600;
    }

    .badge.muted { background: rgba(100, 116, 139, 0.12); color: var(--muted); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 38px;
      padding: 0 18px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease, border-color .15s ease;
    }

    .btn-ghost { border: 1px solid var(--line); color: var(--muted); background: rgba(255, 255, 255, 0.6); }
    .btn-primary { border: 0; color: #fff; background: var(--grad); box-shadow: 0 8px 18px rgba(79, 70, 229, 0.18); }
    .btn-brand { border: 1px solid var(--brand); color: var(--brand); background: var(--brand-soft); }
    .btn-disabled { border: 1px solid var(--line); color: var(--faint); background: rgba(226, 232, 240, 0.4); cursor: not-allowed; }

    .btn-ghost:hover { background: rgba(255, 255, 255, 0.9); border-color: #CBD5E1; }
    .btn-brand:hover { background: rgba(79, 70, 229, 0.16); }
    .nav-item:not(.active):hover { color: var(--text); background: rgba(15, 23, 42, 0.04); }
    .dropdown-item:not(.active):hover { background: rgba(15, 23, 42, 0.04); }

    /* ---------- 响应式 ---------- */
    @media (max-width: 860px) {
      .layout { padding: 16px 16px 40px; }
      .panel { grid-template-columns: 1fr; }
      .panel-nav { border-right: 0; border-bottom: 1px solid var(--line); display: flex; flex-wrap: wrap; gap: 4px; }
      .side-group { width: 100%; }
      .side-item { flex: 1 1 auto; }
      .side-item.sub { padding-left: 12px; }
      .nav-item span.label { display: none; }
      .panel-content { padding: 22px 18px 8px; }
      .method-row { min-height: 92px; gap: 12px; }
      .dropdown { right: -4px; }
    }
  </style>
</head>
<body>
  <!-- 顶部导航：宽度自适应、居中悬浮、大圆角、每段竖线；头像下拉为展开态示意（实际点击展开） -->
  <header class="topbar">
    <nav class="nav-bar" aria-label="主导航">
      <a class="nav-logo" href="#" aria-label="模考Offer 首页">
        <img src="../../../资源/logo/png/horizontal-light-M.png" alt="模考Offer">
      </a>
      <span class="nav-sep"></span>
      <a class="nav-item active" href="#">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 11.5 12 4l8 7.5M6 10v9.5h12V10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="label">首页</span>
      </a>
      <span class="nav-sep"></span>
      <a class="nav-item" href="#">
        <svg viewBox="0 0 24 24" fill="none"><rect x="3.5" y="3.5" width="7" height="7" rx="1.6" stroke="currentColor" stroke-width="1.8"/><rect x="13.5" y="3.5" width="7" height="7" rx="1.6" stroke="currentColor" stroke-width="1.8"/><rect x="3.5" y="13.5" width="7" height="7" rx="1.6" stroke="currentColor" stroke-width="1.8"/><rect x="13.5" y="13.5" width="7" height="7" rx="1.6" stroke="currentColor" stroke-width="1.8"/></svg>
        <span class="label">工作台</span>
      </a>
      <span class="nav-sep"></span>
      <a class="nav-item" href="#">
        <svg viewBox="0 0 24 24" fill="none"><rect x="4" y="5.5" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M9 5.5V4.5A1.5 1.5 0 0 1 10.5 3h3A1.5 1.5 0 0 1 15 4.5v1M8.5 11h7M8.5 15h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <span class="label">岗位</span>
      </a>
      <span class="nav-sep"></span>
      <button class="nav-avatar" type="button" aria-label="用户菜单">
        <span class="avatar"></span>
        <svg class="chev" viewBox="0 0 24 24" fill="none"><path d="m6 9 6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>

      <div class="dropdown" role="menu" aria-label="用户菜单">
        <div class="dropdown-head">
          <span class="avatar"></span>
          <div>
            <div class="name">飘飘</div>
            <div class="mail">you@example.com</div>
          </div>
        </div>
        <div class="dropdown-divider"></div>
        <a class="dropdown-item active" href="#" role="menuitem">
          <svg viewBox="0 0 24 24" fill="none"><path d="M10.5 3.5h3l.5 2.3 2.1.9 2-1.1 2.1 2.1-1.1 2 .9 2.1 2.3.5v3l-2.3.5-.9 2.1 1.1 2-2.1 2.1-2-1.1-2.1.9-.5 2.3h-3l-.5-2.3-2.1-.9-2 1.1-2.1-2.1 1.1-2-.9-2.1L2.7 13.5v-3l2.3-.5.9-2.1-1.1-2L6.9 3.8l2 1.1 2.1-.9z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><circle cx="12" cy="12" r="2.6" stroke="currentColor" stroke-width="1.6"/></svg>
          账号设置
        </a>
        <a class="dropdown-item" href="#" role="menuitem">
          <svg viewBox="0 0 24 24" fill="none"><path d="M15 4H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="m16 15 4-3-4-3M11 12h9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          退出登录
        </a>
      </div>
    </nav>
  </header>

  <div class="layout">
    <div class="panel">
      <!-- 左栏：账号与安全（分组）→ 仅「登录方式」为子项缩进；消息通知/隐私/偏好为顶级项 -->
      <aside class="panel-nav" aria-label="设置分类">
        <div class="side-group">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 3 5 6v5c0 4.5 3 7.6 7 9 4-1.4 7-4.5 7-9V6l-7-3Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="m9 12 2 2 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>账号与安全</span>
          <svg class="grp-chev" viewBox="0 0 24 24" fill="none"><path d="m6 14 6-6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="side-item sub active">
          <svg viewBox="0 0 24 24" fill="none"><rect x="5" y="10" width="14" height="9.5" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M8 10V7.5a4 4 0 0 1 8 0V10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="14.4" r="1.3" fill="currentColor"/></svg>
          <span>登录方式</span>
        </div>
        <div class="side-item disabled">
          <svg viewBox="0 0 24 24" fill="none"><path d="M6 9a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M10 19a2 2 0 0 0 4 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <span class="side-text">消息通知<span class="soon">即将支持</span></span>
        </div>
        <div class="side-item disabled">
          <svg viewBox="0 0 24 24" fill="none"><rect x="5" y="10.5" width="14" height="9.5" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M8 10.5V8a4 4 0 0 1 8 0v2.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <span class="side-text">隐私<span class="soon">即将支持</span></span>
        </div>
        <div class="side-item disabled">
          <svg viewBox="0 0 24 24" fill="none"><path d="M5 8h9M5 16h11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="17" cy="8" r="2.4" stroke="currentColor" stroke-width="1.8"/><circle cx="9" cy="16" r="2.4" stroke="currentColor" stroke-width="1.8"/></svg>
          <span class="side-text">偏好设置<span class="soon">即将支持</span></span>
        </div>
      </aside>

      <!-- 右侧内容 -->
      <section class="panel-content" aria-labelledby="methods-title">
        <h2 class="card-title" id="methods-title">登录方式</h2>
        <p class="card-desc">至少保留一种登录方式</p>

        <div class="method-row">
          <div class="method-info">
            <span class="method-icon">
              <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="5.5" width="18" height="13" rx="2.5" stroke="currentColor" stroke-width="1.8"/><path d="m4 7 8 6 8-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
            <div class="method-text">
              <div class="method-name">邮箱</div>
              <div class="method-sub">you@example.com</div>
            </div>
          </div>
          <button class="btn btn-ghost" type="button">解绑</button>
        </div>

        <div class="method-row">
          <div class="method-info">
            <span class="method-icon">
              <svg viewBox="0 0 24 24" fill="none"><path d="M12 2.2c-5.4 0-9.8 4.4-9.8 9.8 0 4.3 2.8 8 6.7 9.3.5.1.7-.2.7-.5v-1.7c-2.7.6-3.3-1.3-3.3-1.3-.5-1.1-1.1-1.5-1.1-1.5-.9-.6.1-.6.1-.6 1 .1 1.5 1 1.5 1 .9 1.5 2.3 1.1 2.9.8.1-.6.3-1.1.6-1.3-2.2-.2-4.5-1.1-4.5-4.9 0-1.1.4-2 1-2.7-.1-.3-.4-1.3.1-2.6 0 0 .8-.3 2.7 1a9.3 9.3 0 0 1 4.9 0c1.9-1.3 2.7-1 2.7-1 .5 1.3.2 2.3.1 2.6.6.7 1 1.6 1 2.7 0 3.8-2.3 4.7-4.5 4.9.4.3.7.9.7 1.9v2.7c0 .3.2.6.7.5 3.9-1.3 6.7-5 6.7-9.3 0-5.4-4.4-9.8-9.8-9.8Z" fill="currentColor"/></svg>
            </span>
            <div class="method-text">
              <div class="method-name">GitHub</div>
              <div class="method-sub">@piaopiao</div>
            </div>
          </div>
          <button class="btn btn-ghost" type="button">解绑</button>
        </div>

        <div class="method-row">
          <div class="method-info">
            <span class="method-icon">
              <svg viewBox="0 0 24 24" fill="none"><rect x="7" y="2.5" width="10" height="19" rx="2.5" stroke="currentColor" stroke-width="1.8"/><path d="M11 18.5h2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            </span>
            <div class="method-text">
              <div class="method-name">手机号 <span class="badge">未绑定</span></div>
            </div>
          </div>
          <button class="btn btn-brand" type="button">绑定</button>
        </div>

        <div class="method-row">
          <div class="method-info">
            <span class="method-icon wechat">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 4.5C5.4 4.5 2.5 7 2.5 10.1c0 1.8 1 3.4 2.5 4.5L4.4 17l2.7-1.3c.6.2 1.3.3 1.9.3l.5-.0a5 5 0 0 1-.1-1.1c0-3 2.8-5.3 6.4-5.3l.6.0C15.9 6.5 12.8 4.5 9 4.5Z"/><path d="M21.5 14.4c0-2.4-2.4-4.3-5.4-4.3s-5.4 1.9-5.4 4.3 2.4 4.3 5.4 4.3c.6 0 1.2-.1 1.8-.3l1.9 1-.5-1.7c1.4-.8 2.2-2 2.2-3.3Z"/></svg>
            </span>
            <div class="method-text">
              <div class="method-name">微信 <span class="badge muted">未绑定</span></div>
              <div class="method-sub">扫码绑定,快捷登录</div>
            </div>
          </div>
          <button class="btn btn-disabled" type="button" disabled>即将支持</button>
        </div>
      </section>
    </div>
  </div>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>模考Offer - 输入验证码</title>
  <style>
    :root {
      --bg: #F4F6FB;
      --glass: rgba(255, 255, 255, 0.65);
      --text: #0F172A;
      --muted: #64748B;
      --line: #E2E8F0;
      --line-strong: #CBD5E1;
      --brand: #4F46E5;
      --brand-gradient: linear-gradient(135deg, #5B6CFF 0%, #22D3EE 100%);
      --shadow: 0 8px 32px rgba(15, 23, 42, 0.10);
      --font: 'Inter', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 48px 24px;
      overflow: hidden;
      color: var(--text);
      font-family: var(--font);
      letter-spacing: 0;
      background:
        radial-gradient(circle at 18% 72%, rgba(91, 108, 255, 0.16), transparent 30%),
        radial-gradient(circle at 80% 68%, rgba(34, 211, 238, 0.22), transparent 32%),
        var(--bg);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.24)),
        radial-gradient(circle at 50% 96%, rgba(34, 211, 238, 0.12), transparent 18%);
    }

    /* 验证码卡片延续首屏玻璃质感，但移除居中品牌区。 */
    .auth-shell {
      position: relative;
      width: min(420px, 100%);
      padding: 40px 32px 32px;
      border: 1px solid rgba(255, 255, 255, 0.88);
      border-radius: 24px;
      background: var(--glass);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .auth-shell::after {
      content: "";
      position: absolute;
      inset: 1px;
      z-index: -1;
      border-radius: 23px;
      border: 1px solid rgba(226, 232, 240, 0.72);
    }

    .back-btn {
      position: absolute;
      top: 22px;
      left: 22px;
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border: 1px solid #E2E8F0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.6);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.85);
      color: #0F172A;
      text-decoration: none;
    }

    .back-btn svg {
      width: 20px;
      height: 20px;
    }

    h1 {
      margin: 0;
      color: var(--text);
      font-size: 32px;
      line-height: 1.25;
      font-weight: 700;
      text-align: center;
    }

    .subtitle {
      margin: 12px 0 32px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      text-align: center;
    }

    .code-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .code-cell {
      display: grid;
      place-items: center;
      aspect-ratio: 1;
      min-width: 0;
      border: 1px solid var(--line-strong);
      border-radius: 12px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.48);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.88);
      font-size: 24px;
      line-height: 1;
      font-weight: 600;
    }

    .code-cell.is-filled {
      border-color: rgba(91, 108, 255, 0.62);
      box-shadow:
        0 0 0 3px rgba(91, 108, 255, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.88);
    }

    .code-cell.is-active {
      border-color: var(--brand);
      box-shadow:
        0 0 0 3px rgba(91, 108, 255, 0.16),
        inset 0 1px 0 rgba(255, 255, 255, 0.88);
    }

    .resend-link {
      display: block;
      width: fit-content;
      margin: 0 auto 24px;
      border: 0;
      padding: 0;
      color: #94A3B8;
      background: transparent;
      font: 600 14px/1.6 var(--font);
      cursor: not-allowed;
    }

    .primary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 56px;
      border: 0;
      border-radius: 12px;
      color: #FFFFFF;
      background: var(--brand-gradient);
      box-shadow: 0 12px 24px rgba(79, 70, 229, 0.18);
      font: 600 16px/1 var(--font);
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease;
    }

    .primary-btn:hover { transform: translateY(-1px); box-shadow: 0 14px 28px rgba(79, 70, 229, 0.26); }
    .primary-btn:active { transform: translateY(0); box-shadow: 0 8px 18px rgba(79, 70, 229, 0.20); }

    .code-hint {
      margin: 0 0 4px;
      text-align: center;
      color: #94A3B8;
      font-size: 12px;
      line-height: 1.6;
    }

    @media (max-width: 520px) {
      body {
        padding: 24px 16px;
        overflow: auto;
      }

      .auth-shell {
        padding: 28px 24px 32px;
      }

      h1 {
        font-size: 30px;
      }

      .code-grid {
        gap: 8px;
      }

      .code-cell {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="auth-shell" aria-label="验证码登录">
    <a class="back-btn" href="login-step1.html" aria-label="返回修改邮箱">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M15 18 9 12l6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>

    <h1>输入验证码</h1>
    <p class="subtitle">验证码已发送至 you@example.com</p>

    <div class="code-grid" aria-label="6 位验证码">
      <div class="code-cell is-filled" aria-label="第 1 位">2</div>
      <div class="code-cell is-filled" aria-label="第 2 位">8</div>
      <div class="code-cell is-active" aria-label="第 3 位"></div>
      <div class="code-cell" aria-label="第 4 位"></div>
      <div class="code-cell" aria-label="第 5 位"></div>
      <div class="code-cell" aria-label="第 6 位"></div>
    </div>

    <button class="resend-link" type="button" disabled>重新发送验证码 (60s)</button>
    <p class="code-hint">没收到?请检查垃圾邮件文件夹</p>
    <button class="primary-btn" type="button">登录 / 注册</button>
  </main>
</body>
</html>

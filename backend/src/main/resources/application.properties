spring.application.name=mockoffer-backend
server.port=8080
management.endpoints.web.exposure.include=health,info
# 环境差异用 profile 区分；默认 dev，prod 由 SPRING_PROFILES_ACTIVE=prod 激活
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# --- 凭证 / 密钥（环境变量 / deploy/.env 注入，非环境差异）---
spring.datasource.username=${POSTGRES_USER:mockoffer}
spring.datasource.password=${POSTGRES_PASSWORD:mockoffer}
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:dev-placeholder}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:dev-placeholder}
app.jwt.secret=${JWT_SECRET:dev-only-change-me-please-32bytes-minimum-secret}
app.ses.secret-id=${TENCENT_SES_SECRET_ID:}
app.ses.secret-key=${TENCENT_SES_SECRET_KEY:}
app.ses.from-email=${SES_FROM_EMAIL:}
app.ses.template-id=${SES_TEMPLATE_ID:}

# --- 公共配置（各环境一致；DB/Redis 主机、cookie、前端地址在 application-{dev,prod}.properties）---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.data.redis.port=6379
spring.security.oauth2.client.registration.github.scope=read:user
app.jwt.access-ttl-seconds=900
app.jwt.refresh-ttl-seconds=2592000
app.ses.region=ap-hongkong
app.otp.ttl-seconds=600
app.otp.resend-interval-seconds=60
app.otp.daily-limit=10

name: mockoffer

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mockoffer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mockoffer}
      POSTGRES_DB: ${POSTGRES_DB:-mockoffer}
    ports:
      - "5432:5432"
    volumes:
      # PostgreSQL 18+ 镜像把数据目录移到 /var/lib/postgresql 下的子目录，VOLUME 也随之改；挂旧的 /data 会拒绝启动
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mockoffer}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  backend:
    build: ../backend
    ports:
      - "8080:8080"
    environment:
      # 环境差异（DB/Redis 主机、cookie、前端地址）由 prod profile 决定，不在此写
      SPRING_PROFILES_ACTIVE: prod
      # 凭证 / 密钥
      POSTGRES_USER: ${POSTGRES_USER:-mockoffer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mockoffer}
      POSTGRES_DB: ${POSTGRES_DB:-mockoffer}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-please-32bytes-minimum-secret}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-dev-placeholder}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-dev-placeholder}
      TENCENT_SES_SECRET_ID: ${TENCENT_SES_SECRET_ID:-}
      TENCENT_SES_SECRET_KEY: ${TENCENT_SES_SECRET_KEY:-}
      SES_FROM_EMAIL: ${SES_FROM_EMAIL:-}
      SES_TEMPLATE_ID: ${SES_TEMPLATE_ID:-}
      # 容器内无 deploy/.env，靠上面 environment 注入；dotenv 找不到文件时不报错
      SPRINGDOTENV_IGNORE_IF_MISSING: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build: ../frontend
    ports:
      - "3000:3000"
    environment:
      # SSR 时 Next 服务端 → 后端走容器内网；浏览器侧请求仍用公网地址
      BACKEND_INTERNAL_URL: http://backend:8080
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
